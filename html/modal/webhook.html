<div>
  <label for="modal-webhook">Webhook</label>
  <input id="modal-webhook-webhook" class="fit" />
</div>

<button 
  id="modal-webhook-send_canvas"
>Send Battlemap</button>

<div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
  <button 
    id="modal-webhook-record_step_video"
  >Record Next Step Video</button>
  <label for="modal-webhook-record_step_count">Steps</label>
  <input id="modal-webhook-record_step_count" type="number" min="1" value="1" class="fit" style="width: 4rem;" />
</div>

<div style="margin-top: 10px;">
  <label for="modal-webhook-id"
    >ID: </label
  ><input id="modal-webhook-id" class="fit" placeholder="" />
  <button class="inline aim" id="modal-webhook-aim"><span class="mgc_aiming_line"></span></button>
</div>

<button 
  id="modal-webhook-send_ship_data"
>Send Ship Data</button>
